<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付结果</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f7fa; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 500px; background: white; border-radius: 10px; padding: 40px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); text-align: center; }
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 28px; color: #48bb78; margin-bottom: 10px; }
        .header p { color: #718096; }
        .status-icon { font-size: 64px; margin-bottom: 20px; }
        .order-info { background: #f7fafc; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .order-info div { margin: 10px 0; }
        .order-info label { color: #718096; font-size: 14px; }
        .order-info .value { color: #2d3748; font-weight: 600; }
        .btn { padding: 15px 40px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; font-weight: 600; }
        .btn-primary { background: #48bb78; color: white; }
        .back-link { color: #2b6cb0; cursor: pointer; text-decoration: underline; margin-top: 15px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="status-icon">✅</div>
            <h1>支付成功</h1>
            <p>感谢您的支付</p>
        </div>

        <div class="order-info">
            <div><label>订单编号</label><div class="value" id="order-id">...</div></div>
            <div><label>客户姓名</label><div class="value" id="client-name">...</div></div>
            <div><label>支付金额</label><div class="value">¥30.00</div></div>
        </div>

        <a class="btn btn-primary" onclick="backToDashboard()">返回首页</a>
        <br>
        <a class="back-link" onclick="backToDashboard()">返回首页</a>
    </div>

    <script>
        const STORAGE_KEY = 'loan_service_data';
        let currentUser = null;

        function getData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : {};
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function backToDashboard() {
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            const orderId = new URLSearchParams(window.location.search).get('out_trade_no') || new URLSearchParams(window.location.search).get('trade_no');

            if (orderId) {
                const data = getData();
                const order = data.orders.find(o => o.id === orderId);

                if (order) {
                    document.getElementById('order-id').textContent = order.id.substring(0, 12);
                    document.getElementById('client-name').textContent = order.clientName || '-';

                    // 更新订单状态为已支付
                    order.status = 'paid';
                    order.paidAt = new Date().toISOString();
                    order.updatedAt = new Date().toISOString();
                    saveData(data);

                    // 同步到服务器
                    try {
                        fetch('http://localhost:5000/api/save-order', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({order: order})
                        });
                    } catch (e) {
                        console.log('同步订单状态到服务器失败:', e);
                    }
                }
            }
        });
    </script>
</body>
</html>
