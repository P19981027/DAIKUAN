name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Render CLI Setup
        run: |
          curl -fsSL https://api.render.com/install.sh | bash

      - name: Deploy to Render
        env:
          RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
        run: |
          export RENDER_API_TOKEN=${{ secrets.RENDER_API_TOKEN }}
          /root/.render/render render login --token $RENDER_API_TOKEN
          render deploy --config render.yaml
